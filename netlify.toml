[build]
command = "npm run build"
publish = "dist"
functions = "netlify/functions"

[build.environment]
NODE_VERSION = "20"
NPM_FLAGS = "--include=dev"

[context.production]
command = "npm run build"
environment = { NODE_ENV = "production" }

[context.deploy-preview]
command = "npm run build"
environment = { NODE_ENV = "development" }

[context.branch-deploy]
command = "npm run build"
environment = { NODE_ENV = "development" }

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
